name: "MyUSD Stablecoin"
version: "1.0"
description: "Build the core engine for MyUSD, a crypto-backed stablecoin with collateralization, interest rates, and liquidation mechanics"
difficulty: "advanced"
estimated_time: "4 - 12 hours"

setup:
  file:
    hardhat: "packages/hardhat/contracts/MyUSDEngine.sol"
    foundry: "packages/foundry/contracts/MyUSDEngine.sol"

welcome_message: |
  Welcome to the MyUSD Stablecoin Challenge!

  You'll build the **MyUSDEngine** — the core engine powering a crypto-backed stablecoin pegged to $1 USD. You'll implement:

  1. **Collateral & minting** — deposit ETH, calculate value, mint MyUSD against it
  2. **Interest system** — share-based debt tracking with exchange rates
  3. **Borrow rate management** — set rates to influence supply/demand
  4. **Repaying & withdrawing** — repay debt and reclaim collateral safely
  5. **Liquidation** — enforce system stability by liquidating unsafe positions

  **Before we start, open separate terminal windows** (not this one!) and run:

  1. Start your local blockchain:
     ```
     yarn chain
     ```
  2. In another terminal, deploy the contracts:
     ```
     yarn deploy
     ```
  3. In another terminal, start the frontend:
     ```
     yarn start
     ```
  4. Open http://localhost:3000 in your browser.

  > These commands run continuously, so each needs its own terminal window.

  **How this works:**
  - I'll teach you a concept, then give you a coding task
  - You write the code in your editor, then say **"check"** and I'll run the tests
  - Say **"hint"** anytime you're stuck — hints get progressively more specific
  - Use **`/skip`** if you want me to write the code and explain it

  > Re-run `yarn deploy --reset` whenever you want to redeploy with a fresh contract address.

  Your progress is saved automatically. Use `/start` to resume anytime.

  Let's build a stablecoin!

checkpoints:
  # ============================================================
  # CHECKPOINT 1: Collateral, Interest System & Minting
  # ============================================================
  - id: "collateral-and-minting"
    title: "Collateral, Interest System & Minting"
    description: "Implement collateral deposits, share-based interest tracking, and MyUSD minting with position validation"

    context: |
      ## The Foundation: Collateral, Interest & Minting

      We'll implement all the core functions that make the system work. This is a big checkpoint — 8 functions — but they're all connected in a single flow: **deposit ETH → track interest → mint stablecoins safely**.

      ### Part 1: Collateral (2 functions)

      Users deposit ETH as collateral. `addCollateral()` is a `payable` function that records ETH in `s_userCollateral`. `calculateCollateralValue()` converts ETH to USD using the oracle:

      ```solidity
      (collateralAmount * i_oracle.getETHMyUSDPrice()) / PRECISION
      ```

      We divide by `PRECISION` (1e18) because both the amount (in wei) and the price are scaled by 1e18 — multiplying gives 1e36, so we divide once to get back to 1e18.

      ### Part 2: Interest System (3 functions)

      Instead of updating every user's debt when interest accrues, we use a **share-based system** with two key variables:
      - `debtExchangeRate` — how much MyUSD each debt share is worth
      - `lastUpdateTime` — when the rate was last updated

      **Example:** Bob mints 100 MyUSD → gets 100 shares. After a year at 10% interest, each share is worth 1.1 MyUSD, so Bob owes 110 MyUSD — but we only updated one variable, not Bob's balance.

      If Alice then mints 100 MyUSD, she gets `100 / 1.1 = ~90.91` shares. She owes 100 MyUSD now but won't pay interest on the first year's debt.

      Three functions work together:
      - `_getCurrentExchangeRate()` — calculates the exchange rate if interest were accrued right now
      - `_accrueInterest()` — persists the updated exchange rate and timestamp
      - `_getMyUSDToShares()` — converts MyUSD amounts to share amounts

      The interest formula: `interest = totalDebtValue * borrowRate * timeElapsed / (SECONDS_PER_YEAR * 10000)`. The rate is in basis points (500 = 5%).

      ### Part 3: Minting & Position Health (4 functions)

      - `getCurrentDebtValue()` — shares × exchange rate = actual MyUSD owed
      - `calculatePositionRatio()` — collateral value / debt value (returns `type(uint256).max` if no debt)
      - `_validatePosition()` — reverts if position ratio is below 150% (`COLLATERAL_RATIO`)
      - `mintMyUSD()` — converts amount to shares, updates state, validates position, then mints tokens

      The 150% ratio means for every $1 of debt, there must be $1.50 of collateral — a buffer against price drops.

    questions:
      - text: "Why use a share-based system instead of tracking each user's debt directly? What's the efficiency advantage?"
        concepts:
