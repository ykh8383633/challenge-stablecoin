        hint: "ETH price can drop quickly. What happens if a position is exactly 100% collateralized and ETH drops 10%?"

    task:
      description: |
        Open `packages/hardhat/contracts/MyUSDEngine.sol` and implement these 8 functions:

        **Collateral (Checkpoint 2 in contract):**

        1. **`addCollateral()`** (payable):
           - Revert with `Engine__InvalidAmount()` if `msg.value == 0`
           - Add `msg.value` to `s_userCollateral[msg.sender]`
           - Emit `CollateralAdded(msg.sender, msg.value, i_oracle.getETHMyUSDPrice())`

        2. **`calculateCollateralValue(address user)`**:
           - Get user's collateral from `s_userCollateral[user]`
           - Return `(collateralAmount * i_oracle.getETHMyUSDPrice()) / PRECISION`

        **Interest System (Checkpoint 3):**

        3. **`_getCurrentExchangeRate()`**:
           - If `totalDebtShares == 0`, return `debtExchangeRate`
           - Calculate `timeElapsed = block.timestamp - lastUpdateTime`
           - If no time passed or rate is 0, return `debtExchangeRate`
           - Calculate: `totalDebtValue = (totalDebtShares * debtExchangeRate) / PRECISION`
           - Calculate: `interest = (totalDebtValue * borrowRate * timeElapsed) / (SECONDS_PER_YEAR * 10000)`
           - Return: `debtExchangeRate + (interest * PRECISION) / totalDebtShares`

        4. **`_accrueInterest()`**:
           - If `totalDebtShares == 0`, just update `lastUpdateTime` and return
           - Set `debtExchangeRate = _getCurrentExchangeRate()`
           - Set `lastUpdateTime = block.timestamp`

        5. **`_getMyUSDToShares(uint256 amount)`**:
           - Return `(amount * PRECISION) / _getCurrentExchangeRate()`

        **Minting & Position Health (Checkpoint 4):**

        6. **`getCurrentDebtValue(address user)`**:
           - If user has 0 shares, return 0
           - Return `(s_userDebtShares[user] * _getCurrentExchangeRate()) / PRECISION`

        7. **`calculatePositionRatio(address user)`**:
           - Get debt value; if 0, return `type(uint256).max`
           - Return `(collateralValue * PRECISION) / debtValue`

        8. **`_validatePosition(address user)`**:
           - Get position ratio
           - If `(positionRatio * 100) < COLLATERAL_RATIO * PRECISION`, revert with `Engine__UnsafePositionRatio()`

        9. **`mintMyUSD(uint256 mintAmount)`**:
           - Revert if `mintAmount == 0`
           - Convert to shares with `_getMyUSDToShares`, add to user and total shares
           - Call `_validatePosition(msg.sender)` — reverts if unsafe
           - Call `i_myUSD.mintTo(msg.sender, mintAmount)`
           - Emit `DebtSharesMinted(msg.sender, mintAmount, shares)`

        ### Try it out

        After tests pass, redeploy and test on the frontend:

        1. Run `yarn deploy --reset`
        2. On the right side of the screen, hover the top icon to open the collateral menu — try depositing some ETH
        3. Your address should appear in the left table
        4. Hover the mint icon and try minting MyUSD against your collateral (up to 150% collateral ratio)
        5. The frontend should show your MyUSD balance and position ratio

        Say **"check"** when you're ready!
