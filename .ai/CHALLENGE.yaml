            "mine",
            "stale",
            "continuous",
            "by the time",
            "small amount remain",
          ]
        hint: "Think about what happens between when a user submits a transaction and when it's actually executed on-chain. What's changing during that time?"

    task:
      description: |
        Implement two functions:

        1. **`repayUpTo(uint256 amount)`**:
           - Convert amount to shares with `_getMyUSDToShares(amount)`
           - If shares > user's debt shares, cap at user's actual debt:
             - Set `amountInShares = s_userDebtShares[msg.sender]`
             - Set `amount = getCurrentDebtValue(msg.sender)`
           - Revert with `MyUSD__InsufficientBalance()` if `amount == 0` or user's MyUSD balance < amount
           - Revert with `MyUSD__InsufficientAllowance()` if allowance < amount
           - Subtract shares from `s_userDebtShares[msg.sender]` and `totalDebtShares`
           - Call `i_myUSD.burnFrom(msg.sender, amount)`
           - Emit `DebtSharesBurned(msg.sender, amount, amountInShares)`

        2. **`withdrawCollateral(uint256 amount)`**:
           - Revert with `Engine__InvalidAmount()` if amount is 0
           - Revert with `Engine__InsufficientCollateral()` if user has less collateral
           - Set `s_userCollateral[msg.sender]` to the new value (subtract amount)
           - If user has debt shares > 0, call `_validatePosition(msg.sender)`
           - Transfer ETH with `payable(msg.sender).transfer(amount)`
           - Emit `CollateralWithdrawn(msg.sender, amount, i_oracle.getETHMyUSDPrice())`

        ### Try it out

        After tests pass:

        1. Run `yarn deploy --reset`
        2. Try the full workflow on the frontend: deposit collateral → mint MyUSD → repay debt → withdraw collateral
        3. Try withdrawing too much collateral while having debt — it should fail (unsafe position)

        Say **"check"** when you're ready!
