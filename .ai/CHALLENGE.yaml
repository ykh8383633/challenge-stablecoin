      solution: |
        function isLiquidatable(address user) public view returns (bool) {
            uint256 positionRatio = calculatePositionRatio(user);
            return (positionRatio * 100) < COLLATERAL_RATIO * PRECISION;
        }

        function liquidate(address user) external {
            if (!isLiquidatable(user)) {
                revert Engine__NotLiquidatable();
            }

            uint256 userDebtValue = getCurrentDebtValue(user);
            uint256 userCollateral = s_userCollateral[user];
            uint256 collateralValue = calculateCollateralValue(user);

            if (i_myUSD.balanceOf(msg.sender) < userDebtValue) {
                revert MyUSD__InsufficientBalance();
            }

            if (i_myUSD.allowance(msg.sender, address(this)) < userDebtValue) {
                revert MyUSD__InsufficientAllowance();
            }

            i_myUSD.burnFrom(msg.sender, userDebtValue);

            totalDebtShares -= s_userDebtShares[user];
            s_userDebtShares[user] = 0;

            uint256 collateralToCoverDebt = (userDebtValue * userCollateral) / collateralValue;
            uint256 rewardAmount = (collateralToCoverDebt * LIQUIDATOR_REWARD) / 100;
            uint256 amountForLiquidator = collateralToCoverDebt + rewardAmount;

            if (amountForLiquidator > userCollateral) {
                amountForLiquidator = userCollateral;
            }

            s_userCollateral[user] = userCollateral - amountForLiquidator;

            (bool sent, ) = payable(msg.sender).call{ value: amountForLiquidator }("");
            if (!sent) revert Engine__TransferFailed();

            emit Liquidation(user, msg.sender, amountForLiquidator, userDebtValue, i_oracle.getETHMyUSDPrice());
        }

  # ============================================================
  # CHECKPOINT 5: Rate Validation - Savings Rate Constraint
  # ============================================================
  - id: "rate-validation"
    title: "Rate Validation - The Savings Rate Constraint"
    description: "Update setBorrowRate to enforce that borrow rate stays above the savings rate"

    context: |
      ## The Two Levers: Borrow Rate & Savings Rate

      So far, borrowers create sell pressure when they swap MyUSD for ETH. The borrow rate alone can only **destroy demand** (defensive). But to truly maintain the peg, we also need to **create demand**.

      That's where the **savings rate** comes in. Users can stake MyUSD in `MyUSDStaking.sol` to earn yield, making holding MyUSD attractive. This creates buy pressure — people buy MyUSD specifically to stake and earn interest.

      ### The Critical Constraint

      The borrow rate must **always be >= the savings rate**. Why? Because:
      - All MyUSD in existence was borrowed (someone deposited ETH and minted it)
      - Every MyUSD is paying the borrow rate to the protocol
      - The protocol pays the savings rate to stakers
      - If savings rate > borrow rate, the protocol pays out more than it earns — unsustainable!

      ### The Two Levers for Peg Stability
      - **MyUSD < $1**: Increase savings rate (attract buyers) or increase borrow rate (discourage minting)
      - **MyUSD > $1**: Decrease savings rate or decrease borrow rate

      You need to add one line to `setBorrowRate` to enforce this constraint.

    questions:
      - text: "Why must the borrow rate always be greater than or equal to the savings rate? What would happen if this constraint were violated?"
        concepts:
          [
            "earn more than",
            "pay out",
            "unsustainable",
            "insolven",
            "borrower",
            "staker",
            "protocol",
          ]
        hint: "Think about where the yield for stakers comes from — it's the interest paid by borrowers. What happens if you promise stakers more than borrowers are paying?"

    task:
      description: |
        Update **`setBorrowRate(uint256 newRate)`** to add a validation check.

        Add this line **before** the existing code:
        - If `newRate < i_staking.savingsRate()`, revert with `Engine__InvalidBorrowRate()`

        The full function should now be:
        1. Check `newRate >= i_staking.savingsRate()` (revert if not)
        2. Call `_accrueInterest()`
        3. Set `borrowRate = newRate`
        4. Emit `BorrowRateUpdated(newRate)`

        ### Try it out

        After tests pass:

        1. Run `yarn deploy --reset`
        2. Try setting the borrow rate **below** the savings rate — it should fail
        3. Set a valid borrow rate that's above the savings rate — it should succeed

        Say **"check"** when you're ready!
      file:
        hardhat: "packages/hardhat/contracts/MyUSDEngine.sol"
        foundry: "packages/foundry/contracts/MyUSDEngine.sol"
      test:
        hardhat: "yarn test --grep 'Borrow Rate Management'"
        foundry: "yarn test --match-test 'Checkpoint5'"
      hints:
        - "You just need to add one line at the top of setBorrowRate: `if (newRate < i_staking.savingsRate()) revert Engine__InvalidBorrowRate();`"
        - |
          Full updated function:
          ```solidity
          function setBorrowRate(uint256 newRate) external onlyRateController {
              if (newRate < i_staking.savingsRate()) revert Engine__InvalidBorrowRate();
              _accrueInterest();
              borrowRate = newRate;
              emit BorrowRateUpdated(newRate);
          }
          ```
      solution: |
        function setBorrowRate(uint256 newRate) external onlyRateController {
            if (newRate < i_staking.savingsRate()) revert Engine__InvalidBorrowRate();
            _accrueInterest();
            borrowRate = newRate;
            emit BorrowRateUpdated(newRate);
        }

completion_message: |
  Congratulations! You've built the core engine for **MyUSD**, a crypto-backed stablecoin!

  You implemented:
  - **Collateral management** with oracle-based USD valuation
  - **Share-based interest** tracking for gas-efficient debt accounting
  - **Position health** monitoring with 150% collateralization enforcement
  - **Borrow rate management** for peg maintenance
  - **Debt repayment** with the overpayment UX pattern
  - **Liquidation** mechanics to prevent bad debt
  - **Rate validation** to keep the protocol sustainable

  You've seen how stablecoins use **two levers** to maintain their peg:
  - **Borrow rates** for demand destruction
  - **Savings rates** for demand creation

  ## Next: Market Simulation (Borrowers Only)

  Now see your stablecoin in action! The `yarn simulate` script runs automated bots that simulate market participants. At first, these bots only want **leveraged ETH exposure** — they deposit collateral, mint MyUSD, and swap it for more ETH on the DEX. This creates pure sell pressure.

  1. Make sure `yarn chain` is running
  2. Run `yarn deploy --reset` (or set the borrow rate back to 0)
  3. Run `yarn simulate`

  Watch the **console** to see:
  - Each bot's upper borrow rate limit preference
  - Their activity (deposits, mints, swaps)

  Watch the **frontend** to see:
  - MyUSD losing its peg as bots dump it for ETH
  - Total supply of MyUSD increasing

  Now **raise the borrow rate to 30%** from the frontend (in Rate Controls).

  The bots are forced to accept the high interest. What happens?
  - Bots start exiting their positions (repaying debt)
  - Total supply drops significantly
  - The peg is restored

  This shows the power of the borrow rate as **demand destruction** — but is our stablecoin doomed to either a tiny market cap or a broken peg? Not if we add the other lever...

  ## Next: The Savings Rate — Creating Demand

  So far borrowers create sell pressure when they swap MyUSD for ETH. The borrow rate can only **destroy demand** (defensive). To truly maintain the peg, we also need to **create demand**.

  That's where the **savings rate** comes in. Users can stake MyUSD in `MyUSDStaking.sol` to earn yield, making holding MyUSD attractive. This creates buy pressure — people buy MyUSD specifically to stake and earn interest.

  Here's how the system fits together:
  - **`MyUSDStaking.sol`**: Users approve and stake MyUSD to earn the savings rate yield
  - **`RateController.sol`**: Controls both `MyUSDEngine.setBorrowRate()` and `MyUSDStaking.setSavingsRate()` — you can set both from the frontend
  - **The constraint you just built**: Borrow rate must always be >= savings rate, because all MyUSD in existence is paying the borrow rate, and stakers are paid the savings rate. If savings > borrow, the protocol pays out more than it earns

  The two levers for peg stability:
  - **MyUSD < $1**: Increase savings rate (attract buyers) or increase borrow rate (discourage minting)
  - **MyUSD > $1**: Decrease savings rate or decrease borrow rate

  On the frontend, you can see options to set both rates in **Rate Controls**. The `DEX.sol` provides the market where supply and demand play out — the price there reflects the balance of these forces.

  ## Next: Finding Equilibrium

  The `yarn simulate` bots also include **savers** — actors who watch the savings rate. If it's attractive enough, they buy MyUSD from the DEX and stake it in `MyUSDStaking.sol` to earn yield. This creates **buy pressure** to counterbalance the borrowers' sell pressure.

  Now run the automated rate controller alongside the simulation:

  1. Run `yarn simulate` (if not already running)
  2. In another terminal, run `yarn interest-rate-controller`

  This script automatically adjusts both borrow and savings rates to stabilize MyUSD near $1:
  - **MyUSD < $1**: Increase savings rate (attract buyers) or increase borrow rate (discourage minting)
  - **MyUSD > $1**: Decrease savings rate or decrease borrow rate

  It starts in **TEMPERED** mode — raising the borrow rate until the peg stabilizes. Once stable, it switches to **GROWTH** mode — lowering the borrow rate and raising the savings rate to attract more users while maintaining the peg.

  Watch the frontend:
  - Click **Show Rates** on the price graph to see how rate changes affect the price historically
  - The price should find equilibrium, oscillating near the peg
  - You'll see both borrowers and savers active — the two sides of the market

  Try experimenting: manually set extreme borrow/savings rates while `yarn simulate` runs. How does the MyUSD price react?

  ### Key Takeaways

  - **Demand Destruction**: High borrow rates make minting expensive, reducing supply and sell pressure
  - **Demand Creation**: Attractive savings rates make holding MyUSD desirable, increasing buy pressure
  - **Dynamic Equilibrium**: The "correct" rates aren't fixed — they depend on market conditions. The system constantly seeks balance by adjusting incentives
  - **Market Unpredictability**: We simulated just two types of participants. A real market has thousands or millions, all reacting to different incentives in bull and bear markets

  ## Next Steps

  Run `yarn test` to verify all tests pass, then complete the remaining checkpoints on the
  [Speedrun Ethereum challenge page](https://speedrunethereum.com/challenge/stablecoins):
  - Deploy your contract
  - Ship your frontend
  - Verify your contract
