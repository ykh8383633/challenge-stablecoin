  # CHECKPOINT 2: Borrow Rate Management
  # ============================================================
  - id: "borrow-rate"
    title: "Borrow Rate Management"
    description: "Implement setBorrowRate to allow rate changes with proper interest accrual"

    context: |
      ## Managing Borrow Rates

      Interest rates are the primary tool for maintaining the stablecoin peg. The rate controller needs to change the borrow rate, but there's a crucial detail: **interest must be accrued before changing the rate**.

      Why? If you change the rate without accruing first, the new rate would retroactively apply to the entire time since the last update. For example:
      - Rate is 5%, last updated 6 months ago
      - Someone changes rate to 20%
      - Without accruing first: the system would calculate 6 months of interest at 20% instead of 5%!

      By calling `_accrueInterest()` first, we "lock in" the old rate's interest for the elapsed period, then start fresh with the new rate.

      The `setBorrowRate` function uses the `onlyRateController` modifier (already in the contract) to restrict access. Interestingly, anyone can call the `RateController.sol` contract's methods — this was intentional so users can change rates from the frontend without needing special authorization.

    questions:
      - text: "What would happen if you changed the borrow rate without first accruing interest? Why is the order important?"
        concepts:
          [
            "retroactiv",
            "old rate",
            "wrong interest",
            "lock in",
            "elapsed time",
            "previous period",
          ]
        hint: "Think about what _getCurrentExchangeRate calculates — it uses the current borrowRate and the full time since lastUpdateTime."

    task:
      description: |
        Implement **`setBorrowRate(uint256 newRate)`**:

        1. Call `_accrueInterest()` to lock in interest at the old rate
        2. Set `borrowRate = newRate`
        3. Emit `BorrowRateUpdated(newRate)`

        The `onlyRateController` modifier is already on the function signature.

        ### Try it out

        After tests pass:

        1. Run `yarn deploy --reset`
        2. In **Rate Controls** on the frontend, click the edit icon next to the borrow rate
        3. Set a new rate and confirm the transaction

        > Fun fact: anyone can call `RateController.sol`'s methods — this was intentional so you can change rates from the frontend without special authorization.

        Say **"check"** when you're ready!
      file:
        hardhat: "packages/hardhat/contracts/MyUSDEngine.sol"
        foundry: "packages/foundry/contracts/MyUSDEngine.sol"
      test:
        hardhat: "yarn test --grep 'Interest Accrual'"
        foundry: "yarn test --match-test 'Checkpoint2'"
      hints:
        - "It's just 3 lines: accrue interest, update the rate, emit the event."
        - |
          Full solution:
          ```solidity
          function setBorrowRate(uint256 newRate) external onlyRateController {
              _accrueInterest();
              borrowRate = newRate;
              emit BorrowRateUpdated(newRate);
          }
          ```
      solution: |
        function setBorrowRate(uint256 newRate) external onlyRateController {
            _accrueInterest();
            borrowRate = newRate;
            emit BorrowRateUpdated(newRate);
        }

