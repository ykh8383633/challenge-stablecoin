  # CHECKPOINT 3: Repaying Debt & Withdrawing Collateral
  # ============================================================
  - id: "repay-and-withdraw"
    title: "Repaying Debt & Withdrawing Collateral"
    description: "Implement repayUpTo and withdrawCollateral with proper safety checks"

    context: |
      ## Repaying Debt & Withdrawing Collateral

      ### The Overpayment Problem

      Why `repayUpTo` instead of a simple `repay(exactAmount)`? Because debt accrues interest continuously. By the time a user's transaction is mined, their exact debt has changed slightly. If they specify the exact amount, a tiny bit of debt remains unpaid.

      `repayUpTo` solves this — users can specify an amount slightly over their debt, and the function caps repayment at the actual debt. This is a real UX consideration in DeFi protocols.

      The function handles several cases:
      - **Exact repayment** — amount matches debt
      - **Overpayment** — capped at actual debt value
      - **Partial repayment** — only repays specified amount
      - **Insufficient balance/allowance** — reverts with appropriate errors

      ### Safe Withdrawals

      `withdrawCollateral` must ensure the user's position stays safe after withdrawal. The pattern:
      1. Reduce collateral in storage
      2. If user has debt, validate the position
      3. If validation fails, the entire tx reverts (collateral reduction is undone)
      4. If safe, transfer ETH

      This "optimistic update with rollback" works because Solidity reverts ALL state changes in a failed transaction.

    questions:
      - text: "Why can't we just have a simple repay(exactAmount) function? What real-world problem does repayUpTo solve?"
        concepts:
          [
