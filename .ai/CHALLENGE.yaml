  # CHECKPOINT 4: Liquidation
  # ============================================================
  - id: "liquidation"
    title: "Liquidation - Enforcing System Stability"
    description: "Implement isLiquidatable and liquidate to protect the system from bad debt"

    context: |
      ## Liquidation: The System's Safety Net

      If ETH price drops or debt accrues too much interest, positions can fall below the 150% collateral ratio. **Liquidation** ensures bad debt never accumulates:

      1. Anyone can check if a position is unsafe with `isLiquidatable()`
      2. Anyone can call `liquidate()` on an unsafe position
      3. The liquidator pays off the user's debt and receives their collateral **plus a 10% bonus** (`LIQUIDATOR_REWARD`)

      This creates a market of liquidators who actively monitor the system, act quickly when positions become unsafe, and profit from their service — all while keeping the protocol healthy.

      ### How liquidation works step by step:
      1. Check the position is actually liquidatable
      2. Verify the liquidator has enough MyUSD and has approved spending
      3. Burn the liquidator's MyUSD to cover the debt
      4. Clear the user's debt shares
      5. Calculate collateral to cover debt + 10% reward
      6. Cap at the user's total collateral (can't give away more than exists)
      7. Transfer collateral to the liquidator

      **Important:** The liquidated user still keeps the MyUSD they originally minted. The liquidator used their own MyUSD to pay off the debt.

    questions:
      - text: "After a liquidation, the original borrower still has the MyUSD they minted. Who actually 'paid' for the debt to be cleared?"
        concepts:
          [
            "liquidator",
            "their own",
            "burn",
            "collateral",
            "reward",
